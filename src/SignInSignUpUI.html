<!doctype html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<link rel="icon" type="image/png" sizes="32x32" href="../media/icon/planet-earth.png" />
	<title>Space</title>
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link
		href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap"
		rel="stylesheet" />
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
		integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" />
	<link rel="stylesheet" href="./css/bg.css" />
	<link rel="stylesheet" href="./css/style.css" />
</head>

<body>
	<section>
		<div id="sky"></div>
		<div class="my-container">
			<div class="forms-container">
				<div class="signin-signup">
					<form action="" class="sign-in-form my-form">
						<h2 class="title">Sign In</h2>
						<div class="my-input-field">
							<i class="fas fa-user"></i>
							<input type="text" placeholder="Username" />
						</div>
						<div class="my-input-field">
							<i class="fas fa-lock"></i>
							<input type="password" placeholder="Password" />
						</div>
						<input type="submit" value="Login" class="my-btn solid" />

						<p class="social-text">Or</p>
						<div class="social-media">
							<a href="#" class="social-icon">
								<i class="fab fa-facebook-f"></i>
							</a>
							<a href="#" class="social-icon">
								<i class="fab fa-twitter"></i>
							</a>
							<a href="#" class="social-icon">
								<i class="fab fa-google"></i>
							</a>
							<a href="#" class="social-icon">
								<i class="fab fa-linkedin-in"></i>
							</a>
						</div>
					</form>

					<form action="" class="sign-up-form my-form">
						<h2 class="title">Sign Up</h2>
						<div class="my-input-field">
							<i class="fas fa-user"></i>
							<input type="text" placeholder="Username" />
						</div>
						<div class="my-input-field">
							<i class="fas fa-envelope"></i>
							<input type="text" placeholder="Email" />
						</div>
						<div class="my-input-field">
							<i class="fas fa-lock"></i>
							<input type="password" placeholder="Password" />
						</div>
						<input type="submit" value="Sign Up" class="my-btn solid" />

						<p class="social-text">Or</p>
						<div class="social-media">
							<a href="#" class="social-icon">
								<i class="fab fa-facebook-f"></i>
							</a>
							<a href="#" class="social-icon">
								<i class="fab fa-twitter"></i>
							</a>
							<a href="#" class="social-icon">
								<i class="fab fa-google"></i>
							</a>
							<a href="#" class="social-icon">
								<i class="fab fa-linkedin-in"></i>
							</a>
						</div>
					</form>
				</div>
			</div>

			<div class="my-panels-container">
				<div class="my-panel my-left-panel">
					<div class="my-content">
						<h3>New here?</h3>
						<p>
							Sign up now to create an account and access exclusive features.
						</p>
						<button type="button" class="my-btn transparent" id="sign-up-btn">
							Sign Up
						</button>
					</div>

					<img src="../media/img/rock.png" alt="stars" class="my-image" />
				</div>

				<div class="my-panel my-right-panel">
					<div class="my-content">
						<h3>Already have an account?</h3>
						<p>
							Sign in now to access your account and continue where you left
							off.
						</p>
						<button type="button" class="my-btn transparent" id="sign-in-btn">
							Sign In
						</button>
					</div>

					<img src="../media/img/rock2.png" alt="stars" style="max-width: 350px;" class="my-image" />
				</div>
			</div>
		</div>
	</section>

	<script src="./javascript/bg.js" defer></script>
	<script src="./javascript/script.js" defer></script>
</body>

</html>
